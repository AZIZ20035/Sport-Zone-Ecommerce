<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SportZone — Login to your account to shop premium sports gear.">
    <title>SportZone — Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card__logo">Sport<span>Zone</span></div>
            <h1 class="auth-card__title">Welcome Back</h1>
            <p class="auth-card__subtitle">Login to continue shopping</p>

            <div class="general-error" id="general-error"></div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
                    <div class="error-message" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password">
                    <div class="error-message" id="password-error"></div>
                </div>

                <button type="submit" class="btn btn--primary" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>

            <p class="auth-card__footer">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>

</html>
