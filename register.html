<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SportZone — Create your account to shop premium sports gear, jerseys, and equipment.">
  <title>SportZone — Register</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">Sport<span>Zone</span></div>
      <h1 class="auth-card__title">Create Account</h1>
      <p class="auth-card__subtitle">Join SportZone and start shopping</p>

      <div class="general-error" id="general-error"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" autocomplete="name">
          <div class="error-message" id="name-error"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password">
          <div class="error-message" id="confirmPassword-error"></div>
        </div>

        <button type="submit" class="btn btn--primary" id="register-btn">
          <i class="fa-solid fa-user-plus"></i> Register
        </button>
      </form>

      <p class="auth-card__footer">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
