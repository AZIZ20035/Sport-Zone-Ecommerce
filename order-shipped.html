<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="description" content="SportZone — Review your cart and checkout.">
    <title>SportZone — Order Shipped</title>
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <div class="order-shipped" id="order-shipped">
        <div class="order-shipped__box">

            <a href="home.html" class="btn btn--yellow">
                <i class="fa-solid fa-arrow-left"></i> Continue Shopping

    </div>

    <div id="footer-container"></div>

    <script type="module" src="js/orderShipped.js"></script>
